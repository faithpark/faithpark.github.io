<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <link rel="stylesheet" type="text/css" href="style.css">
      <title>Redzone</title>
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
      <link rel="stylesheet" href="https://use.typekit.net/pda6vnr.css">
      <link rel="stylesheet" href="https://use.typekit.net/pda6vnr.css">
   </head>
   <body>
      <div class="container">
         <header>
            <h1>
               <a href="index.html"><img src="redzone-logo.svg" alt="Redzone Magazine Co. logo"></a>
            </h1>
            <nav>
               <ul>
                  <li>
                     <a href="#">Technology</a>
                  </li>
                  <li>
                     <a href="#">News</a>
                  </li>
                  <li>
                     <a href="#">Health</a>
                  </li>
                  <li>
                     <a href="#">About Us</a>
                  </li>
                  <li>
                     <a href="newsletter.html">Subscribe to Our Newsletter</a>
                  </li>
               </ul>
            </nav>
         </header>
         <main class="newsletter">
            <form>
               <section class="info">
                  <h2>Personal Info</h2>
                  <ul>
                     <li>
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Please enter your first and last name">
                     </li>
                     <li>
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="example@email.com">
                     </li>
                  </ul>
               </section>
               <section class="newsletter-options">
                  <h2>Newsletters</h2>
                  <ul>
                     <li>
                        <input type="radio" id="option1">
                        <label for="option1">Health and Wellbeing</label>
                     </li>
                     <li>
                        <input type="radio" id="option2">
                        <label for="option2">Environmental Research</label>
                     </li>
                     <li>
                        <input type="radio" id="option3">
                        <label for="option3">Sustainable Policy</label>
                     </li>
                  </ul>
               </section>
               <section class="button">
                  <button>Sign Up</button>
               </section>
            </form>
         </main>
         <footer>
            <p>All rights reserved.</p>
         </footer>
      </div>
   </body>
</html>
